<!DOCTYPE html>
<html>

<head>

<title>CoinDCX Trading Dashboard</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
}

.card{
background:#1e293b;
padding:15px;
margin:10px;
display:inline-block;
width:200px;
border-radius:8px;
}

.buy{color:#22c55e}
.sell{color:#ef4444}
.hold{color:#eab308}

button{
padding:10px;
margin:5px;
border:none;
border-radius:5px;
cursor:pointer;
}

.panel{
width:70%;
margin:auto;
background:#1e293b;
padding:10px;
height:150px;
overflow:auto;
text-align:left;
margin-top:20px;
}

</style>

</head>

<body>

<h1>CoinDCX AI Trading Terminal</h1>

<a href="https://coindcx.com/exchange" target="_blank">
Open CoinDCX Exchange
</a>

<br><br>

Mode:
<select id="modeToggle" onchange="setMode()">
<option value="paper">Paper</option>
<option value="live">Live</option>
</select>

<br><br>

<button onclick="startBot()">Start Bot</button>
<button onclick="stopBot()">Stop Bot</button>
<button onclick="loadAll()">Refresh</button>

<h2>Market Signals</h2>

<div id="market"></div>

<h2>Trade Log</h2>
<div class="panel" id="tradeLog"></div>

<h2>Error Log</h2>
<div class="panel" id="errorLog"></div>

<script>

async function loadSignals(){

let res=await fetch("/signals")
let data=await res.json()

let html=""

for(let s in data){

let price=await fetch("/price/"+s)
let p=await price.json()

let sig=data[s]

html+=`
<div class="card">

<h3>${s}</h3>

<div>₹ ${p.price}</div>

<div class="${sig.toLowerCase()}">${sig}</div>

</div>
`
}

document.getElementById("market").innerHTML=html

}


async function loadTradeLog(){

let r=await fetch("/trade_log")
let d=await r.json()

document.getElementById("tradeLog").innerHTML=d.join("<br>")
}

async function loadErrorLog(){

let r=await fetch("/error_log")
let d=await r.json()

document.getElementById("errorLog").innerHTML=d.join("<br>")
}

async function startBot(){

await fetch("/start")
alert("Bot Started")
}

async function stopBot(){

await fetch("/stop")
alert("Bot Stopped")
}

async function setMode(){

let mode=document.getElementById("modeToggle").value

await fetch("/mode",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({mode:mode})
})

}

async function loadMode(){

let r=await fetch("/mode")
let d=await r.json()

document.getElementById("modeToggle").value=d.mode
}

function loadAll(){

loadSignals()
loadTradeLog()
loadErrorLog()
}

loadMode()
loadAll()

setInterval(loadAll,10000)

</script>

</body>
</html>
