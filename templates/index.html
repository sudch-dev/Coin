<!DOCTYPE html>
<html>

<head>

<title>CoinDCX AI Trading Engine</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
margin:0;
}

header{
background:#020617;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
width:900px;
margin:auto;
margin-top:30px;
}

.card{
background:#1e293b;
padding:20px;
margin-bottom:20px;
border-radius:10px;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
}

button{
padding:10px 20px;
background:#22c55e;
border:none;
color:white;
cursor:pointer;
margin-right:10px;
}

.stop{
background:#ef4444;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:10px;
text-align:center;
}

</style>

</head>

<body>

<header>
CoinDCX AI Trading Engine
</header>

<div class="container">

<div class="card">

<h3>Trading Settings</h3>

<label>Capital (INR)</label>
<input id="capital">

<label>Risk per Trade (%)</label>
<input id="risk" value="1">

<label>Take Profit (%)</label>
<input id="tp" value="2">

<button onclick="save()">Save Settings</button>

<button onclick="startBot()">Start Bot</button>

<button class="stop" onclick="stopBot()">Stop Bot</button>

<div id="msg"></div>

</div>

<div class="card">

<h3>Status</h3>

<div id="status"></div>

</div>

<div class="card">

<h3>Active Positions</h3>

<table>

<thead>

<tr>
<th>Pair</th>
<th>Side</th>
<th>Entry</th>
</tr>

</thead>

<tbody id="positions"></tbody>

</table>

</div>

</div>

<script>

function save(){

fetch("/set_config",{

method:"POST",
headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

capital:document.getElementById("capital").value,
risk:document.getElementById("risk").value,
tp:document.getElementById("tp").value

})

})

.then(r=>r.json())
.then(d=>{

document.getElementById("msg").innerHTML="Settings saved"

})

}

function startBot(){

fetch("/start")
.then(r=>r.json())
.then(d=>{

document.getElementById("msg").innerHTML="Bot started"

})

}

function stopBot(){

fetch("/stop")
.then(r=>r.json())
.then(d=>{

document.getElementById("msg").innerHTML="Bot stopped"

})

}

function load(){

fetch("/status")
.then(r=>r.json())
.then(d=>{

document.getElementById("status").innerHTML =
"Capital: ₹"+d.capital+" | Running: "+d.running

let rows=""

for(let p in d.positions){

rows+=`
<tr>
<td>${p}</td>
<td>${d.positions[p]}</td>
<td>${d.entry[p]}</td>
</tr>
`

}

document.getElementById("positions").innerHTML=rows

})

}

setInterval(load,5000)

</script>

</body>
</html>
