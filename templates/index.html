<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoinDCX Futures Bot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0e11; color: #eaecef; }
        .card { background-color: #1e2329; border-radius: 8px; padding: 1.5rem; }
        .accent { color: #f0b90b; } /* CoinDCX/Exchange Yellow */
    </style>
</head>
<body class="p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 border-b border-gray-700 pb-4">
            <span class="accent">CoinDCX</span> Futures Bot
        </h1>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="card">
                <p class="text-gray-400 text-sm">Wallet Balance</p>
                <p id="equity" class="text-2xl font-mono">-- USDT</p>
            </div>
            <div class="card">
                <p class="text-gray-400 text-sm">Mark Price</p>
                <p id="mark" class="text-2xl font-mono accent">--</p>
            </div>
            <div class="card">
                <p class="text-gray-400 text-sm">Unrealised PnL</p>
                <p id="pnl" class="text-2xl font-mono">--</p>
            </div>
        </div>

        <div class="card mb-8">
            <h2 class="text-xl font-bold mb-4">Position Details</h2>
            <div class="flex justify-between border-b border-gray-700 py-2">
                <span>Side</span> <span id="side">--</span>
            </div>
            <div class="flex justify-between border-b border-gray-700 py-2">
                <span>Size</span> <span id="size">--</span>
            </div>
            <div class="flex justify-between py-2">
                <span>Entry Price</span> <span id="entry">--</span>
            </div>
        </div>

        <div class="flex gap-4">
            <button onclick="controlBot('start')" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded font-bold transition">START BOT</button>
            <button onclick="controlBot('stop')" class="bg-red-600 hover:bg-red-700 text-white px-6 py-2 rounded font-bold transition">STOP BOT</button>
        </div>
    </div>

    <script>
        async function updateStatus() {
            try {
                const res = await fetch('/status');
                const data = await res.json();
                
                document.getElementById('equity').innerText = data.equity + " USDT";
                document.getElementById('mark').innerText = data.mark;
                document.getElementById('side').innerText = data.side;
                document.getElementById('size').innerText = data.size;
                document.getElementById('entry').innerText = data.entry;
                
                const pnlEl = document.getElementById('pnl');
                pnlEl.innerText = data.pnl + " USDT (" + data.roe + "%)";
                pnlEl.className = data.pnl >= 0 ? "text-2xl font-mono text-green-500" : "text-2xl font-mono text-red-500";
            } catch (e) { console.error("Update failed", e); }
        }

        async function controlBot(action) {
            await fetch('/' + action, { method: 'POST' });
            alert("Bot " + action + "ed");
        }

        setInterval(updateStatus, 3000);
        updateStatus();
    </script>
</body>
</html>
