<!DOCTYPE html>
<html>
<head>

<title>AI SMC Trading Engine</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding-top:40px;
}

input{
padding:10px;
font-size:16px;
}

button{
padding:10px 20px;
font-size:16px;
background:#22c55e;
border:none;
color:white;
cursor:pointer;
}

#status{
margin-top:20px;
font-size:18px;
}

</style>

</head>

<body>

<h1>SMC AI Trading Engine</h1>

<p>Enter Capital (INR)</p>

<input id="capital" type="number"/>

<button onclick="setCapital()">Set Capital</button>

<div id="status"></div>

<script>

function setCapital(){

let capital=document.getElementById("capital").value

fetch("/set_capital",{

method:"POST",
headers:{
"Content-Type":"application/x-www-form-urlencoded"
},
body:"capital="+capital

})

.then(res=>res.json())

.then(data=>{

document.getElementById("status").innerHTML =
"Capital Set Successfully : ₹"+data.capital

})

}

</script>

</body>
</html>
