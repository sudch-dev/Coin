<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTCINR Pro Bot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .card { background-color: #1e293b; border: 1px solid #334155; }
        .log-entry { font-family: 'Courier New', monospace; font-size: 0.85rem; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold text-blue-400 underline decoration-2">BTCINR Algo-Trader</h1>
            <div id="status-badge" class="px-3 py-1 rounded-full bg-green-900 text-green-300 text-sm">System Live</div>
        </header>

        <!-- Portfolio Overview -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="card p-4 rounded-xl shadow-lg">
                <p class="text-gray-400 text-sm">INR Balance</p>
                <h2 id="inr-bal" class="text-2xl font-mono">₹0.00</h2>
            </div>
            <div class="card p-4 rounded-xl shadow-lg">
                <p class="text-gray-400 text-sm">BTC Balance</p>
                <h2 id="btc-bal" class="text-2xl font-mono">0.00000000</h2>
            </div>
            <div class="card p-4 rounded-xl shadow-lg">
                <p class="text-gray-400 text-sm">Live Price</p>
                <h2 id="live-price" class="text-2xl font-mono text-yellow-400">₹0.00</h2>
            </div>
        </div>

        <!-- Trade Controls -->
        <div class="card p-6 rounded-xl mb-8">
            <h3 class="text-lg font-semibold mb-4">Manual Override / Quick Trade</h3>
            <div class="flex gap-4">
                <input id="trade-qty" type="number" step="0.0001" placeholder="Quantity in BTC" class="flex-1 bg-slate-900 border border-slate-700 p-2 rounded text-white outline-none focus:border-blue-500">
                <button onclick="executeTrade('buy')" class="bg-green-600 hover:bg-green-700 px-6 py-2 rounded font-bold transition">BUY</button>
                <button onclick="executeTrade('sell')" class="bg-red-600 hover:bg-red-700 px-6 py-2 rounded font-bold transition">SELL</button>
            </div>
        </div>

        <!-- Professional Logs -->
        <div class="card p-6 rounded-xl">
            <h3 class="text-lg font-semibold mb-4">Trade Logs & Execution Status</h3>
            <div id="log-container" class="space-y-2 max-h-64 overflow-y-auto pr-2">
                <!-- Logs injected here -->
                <p class="text-gray-500 italic">Waiting for execution data...</p>
            </div>
        </div>
    </div>

    <script>
        async function updateDashboard() {
            try {
                const response = await fetch('/api/portfolio');
                const data = await response.json();
                
                document.getElementById('inr-bal').innerText = `₹${data.inr.toLocaleString()}`;
                document.getElementById('btc-bal').innerText = data.btc.toFixed(8);
                document.getElementById('live-price').innerText = `₹${data.current_price.toLocaleString()}`;

                const logContainer = document.getElementById('log-container');
                if (data.logs.length > 0) {
                    logContainer.innerHTML = data.logs.reverse().map(log => `
                        <div class="log-entry border-b border-slate-800 pb-2">
                            <span class="text-gray-500">[${log.time}]</span> 
                            <span class="${log.side === 'buy' ? 'text-green-400' : 'text-red-400'} font-bold uppercase">${log.side}</span>
                            <span class="text-blue-300">${log.qty} BTC</span> 
                            <span class="text-gray-400">ID: ${log.order_id}</span>
                            <span class="ml-2 px-1 rounded bg-slate-700 text-[10px]">${log.status}</span>
                        </div>
                    `).join('');
                }
            } catch (err) {
                console.error("Update failed", err);
            }
        }

        async function executeTrade(side) {
            const qty = document.getElementById('trade-qty').value;
            if(!qty) return alert("Enter Quantity");
            
            const res = await fetch('/trade', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ side, quantity: qty })
            });
            const result = await res.json();
            alert(JSON.stringify(result));
            updateDashboard();
        }

        // Auto-refresh every 5 seconds
        setInterval(updateDashboard, 5000);
        updateDashboard();
    </script>
</body>
</html>
