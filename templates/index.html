<!DOCTYPE html>
<html>
<head>
    <title>CoinDCX Trading Bot</title>
    <style>
        body { font-family: Arial; background:#111; color:#eee; text-align:center; }
        .card { margin:40px auto; padding:20px; width:400px; background:#222; border-radius:10px; }
        h1 { color:#00ffcc; }
    </style>
</head>
<body>

<div class="card">
    <h1>🚀 CoinDCX Bot</h1>

    <p><b>Running:</b> {{ state.running }}</p>
    <p><b>Last Signal:</b> {{ state.last_signal }}</p>
    <p><b>Last Trade:</b> {{ state.last_trade }}</p>

</div>

</body>
</html>
