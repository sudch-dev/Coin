<!DOCTYPE html>
<html>
<head>
    <title>AI ML Crypto Engine</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: Arial;
            background: #111;
            color: #eee;
            text-align: center;
            padding: 30px;
        }
        h1 { color: #00ff99; }
        button {
            padding: 12px 25px;
            margin: 10px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .start { background: #00cc66; color: white; }
        .stop { background: #cc3333; color: white; }
        .box {
            margin-top: 30px;
            padding: 20px;
            background: #222;
            border-radius: 10px;
            display: inline-block;
            min-width: 300px;
        }
        .status { font-size: 20px; margin: 10px 0; }
        .label { color: #aaa; }
    </style>
</head>
<body>

<h1>🚀 AI/ML Crypto Trading Engine</h1>
<p>Exchange: CoinDCX India (Spot INR)</p>

<button class="start" onclick="startBot()">Start Bot</button>
<button class="stop" onclick="stopBot()">Stop Bot</button>

<div class="box">
    <div class="status" id="botStatus">Status: Idle</div>
    <div><span class="label">Last Update:</span> <span id="lastUpdate">--</span></div>
    <div><span class="label">INR Balance:</span> ₹<span id="inrBalance">0</span></div>
    <div><span class="label">Error:</span> <span id="errorMsg">None</span></div>
</div>

<script>

function startBot() {
    fetch('/start', {method: 'POST'})
    .then(res => res.json())
    .then(data => alert("Bot Started"));
}

function stopBot() {
    fetch('/stop', {method: 'POST'})
    .then(res => res.json())
    .then(data => alert("Bot Stopped"));
}

function updateStatus() {
    fetch('/status')
    .then(res => res.json())
    .then(data => {
        document.getElementById("botStatus").innerText = "Status: " + data.status;
        document.getElementById("lastUpdate").innerText = data.last;
        document.getElementById("inrBalance").innerText = data.INR.toFixed(2);
        document.getElementById("errorMsg").innerText = data.error || "None";
    });
}

setInterval(updateStatus, 3000);
updateStatus();

</script>

</body>
</html>
