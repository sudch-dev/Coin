<!DOCTYPE html>
<html>
<head>
  <title>ORDI Futures Pro Bot</title>
  <style>
    body { font-family: Arial; background:#111; color:#eee; text-align:center; }
    .card { background:#222; padding:20px; margin:20px auto; width:320px; border-radius:10px; }
    button { padding:12px 20px; margin:8px; font-size:16px; border:none; border-radius:6px; }
    .buy { background:#00c853; color:white; }
    .sell { background:#d50000; color:white; }
  </style>
</head>

<body>

<h1>ORDIUSDT Futures — PRO</h1>

<div class="card">
  <p>Price: <span id="price">-</span></p>
  <p>Wallet: <span id="wallet">-</span> USDT</p>
  <p>Available: <span id="available">-</span> USDT</p>
  <p>PnL: <span id="pnl">-</span></p>
</div>

<div class="card">
  <button class="buy" onclick="trade('buy')">LONG</button>
  <button class="sell" onclick="trade('sell')">SHORT</button>
</div>

<script>
async function update() {
  const r = await fetch('/status');
  const d = await r.json();

  document.getElementById('price').innerText = d.price.toFixed(3);
  document.getElementById('wallet').innerText = d.wallet_balance.toFixed(2);
  document.getElementById('available').innerText = d.available_balance.toFixed(2);
  document.getElementById('pnl').innerText = d.pnl.toFixed(2);
}

async function trade(side) {
  const r = await fetch('/' + side);
  const d = await r.json();
  alert(JSON.stringify(d));
  update();
}

setInterval(update, 3000);
update();
</script>

</body>
</html>
