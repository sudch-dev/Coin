<!DOCTYPE html>
<html>
<head>
  <title>CoinDCX Futures Pro Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      background: #0b0f17;
      color: #e6edf3;
      font-family: Arial;
      padding: 15px;
    }

    h2 { color: #4cc9f0; }

    .card {
      background: #111826;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      margin: 5px 0;
    }

    button {
      padding: 10px;
      margin: 5px;
      border-radius: 6px;
      border: none;
      font-size: 16px;
    }

    .buy { background: #16c784; color: black; }
    .sell { background: #ea3943; color: white; }
    .stop { background: orange; color: black; }

    .log {
      background: black;
      padding: 10px;
      height: 150px;
      overflow-y: auto;
      font-size: 13px;
    }
  </style>
</head>

<body>

<h2>🚀 CoinDCX Futures Bot — ORDIUSDT</h2>

<div class="card">
  <h3>🏦 Account</h3>
  <div class="row"><span>Equity:</span><span id="equity">--</span></div>
  <div class="row"><span>Available:</span><span id="available">--</span></div>
  <div class="row"><span>Used Margin:</span><span id="margin">--</span></div>
  <div class="row"><span>Unrealized P&L:</span><span id="upl">--</span></div>
  <div class="row"><span>Realized Today:</span><span id="rpl">--</span></div>
</div>

<div class="card">
  <h3>📊 Position</h3>
  <div class="row"><span>Side:</span><span id="side">--</span></div>
  <div class="row"><span>Size:</span><span id="size">--</span></div>
  <div class="row"><span>Entry:</span><span id="entry">--</span></div>
  <div class="row"><span>Mark Price:</span><span id="mark">--</span></div>
  <div class="row"><span>P&L:</span><span id="pnl">--</span></div>
  <div class="row"><span>ROE %:</span><span id="roe">--</span></div>
  <div class="row"><span>Liq Price:</span><span id="liq">--</span></div>
</div>

<div class="card">
  <h3>📋 Orders</h3>
  <div id="orders">No active orders</div>
</div>

<div class="card">
  <h3>⚡ Bot Control</h3>
  <button class="buy" onclick="start()">START</button>
  <button class="stop" onclick="stop()">STOP</button>
</div>

<div class="card">
  <h3>📜 Logs</h3>
  <div class="log" id="logs"></div>
</div>

<script>
async function refresh() {
  const res = await fetch('/status');
  const d = await res.json();

  document.getElementById("equity").innerText = d.equity;
  document.getElementById("available").innerText = d.available;
  document.getElementById("margin").innerText = d.margin;
  document.getElementById("upl").innerText = d.upl;
  document.getElementById("rpl").innerText = d.rpl;

  document.getElementById("side").innerText = d.side;
  document.getElementById("size").innerText = d.size;
  document.getElementById("entry").innerText = d.entry;
  document.getElementById("mark").innerText = d.mark;
  document.getElementById("pnl").innerText = d.pnl;
  document.getElementById("roe").innerText = d.roe;
  document.getElementById("liq").innerText = d.liq;

  document.getElementById("orders").innerText = d.orders;

  document.getElementById("logs").innerText =
    (d.logs || []).join("\n");
}

async function start() { await fetch('/start', {method:'POST'}); }
async function stop() { await fetch('/stop', {method:'POST'}); }

setInterval(refresh, 3000);
refresh();
</script>

</body>
</html>
