<!DOCTYPE html>
<html>
<head>
    <title>CoinDCX Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background: #0b0e11; color: white; font-family: sans-serif; }</style>
</head>
<body class="p-10">
    <div class="max-w-2xl mx-auto bg-gray-900 p-8 rounded-xl shadow-2xl border border-gray-800">
        <h1 class="text-2xl font-bold mb-6 text-yellow-500">CoinDCX Live Monitor</h1>
        
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="p-4 bg-black rounded">
                <p class="text-gray-400 text-xs uppercase">Wallet (USDT)</p>
                <p id="equity" class="text-xl font-mono">Loading...</p>
            </div>
            <div class="p-4 bg-black rounded">
                <p class="text-gray-400 text-xs uppercase">ORDI Price</p>
                <p id="mark" class="text-xl font-mono text-yellow-400">Loading...</p>
            </div>
        </div>

        <div class="space-y-2 text-sm">
            <div class="flex justify-between border-b border-gray-800 py-2">
                <span>Position Side:</span> <span id="side">--</span>
            </div>
            <div class="flex justify-between py-2">
                <span>Unrealized PnL:</span> <span id="pnl" class="font-bold">--</span>
            </div>
        </div>
    </div>

    <script>
        async function refresh() {
            try {
                const res = await fetch('/status');
                const d = await res.json();
                document.getElementById('equity').innerText = d.equity;
                document.getElementById('mark').innerText = d.mark;
                document.getElementById('side').innerText = d.side;
                document.getElementById('pnl').innerText = d.pnl + " USDT";
            } catch (e) { console.error("Update error"); }
        }
        setInterval(refresh, 5000);
        refresh();
    </script>
</body>
</html>
