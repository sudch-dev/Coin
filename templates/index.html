<!DOCTYPE html>
<html>

<head>

<title>SMC Trading Engine</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
padding-top:60px;
}

input{
padding:10px;
font-size:16px;
}

button{
padding:10px 20px;
background:#22c55e;
border:none;
color:white;
cursor:pointer;
}

#msg{
margin-top:20px;
font-size:18px;
}

</style>

</head>

<body>

<h1>CoinDCX AI Trading Engine</h1>

<p>Set Capital (INR)</p>

<input id="capital" type="number">

<button onclick="setCapital()">Set Capital</button>

<div id="msg"></div>

<script>

function setCapital(){

let c=document.getElementById("capital").value

fetch("/set_capital",{

method:"POST",
headers:{
"Content-Type":"application/x-www-form-urlencoded"
},
body:"capital="+c

})
.then(res=>res.json())
.then(data=>{
document.getElementById("msg").innerHTML =
"Capital set successfully: ₹"+data.capital
})

}

</script>

</body>
</html>
