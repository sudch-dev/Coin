<!DOCTYPE html>
<html>
<head>
    <title>Institutional SMC Engine</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: #0f172a;
            color: #e2e8f0;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        .card {
            background-color: #1e293b;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
        }

        input {
            padding: 10px;
            width: 200px;
            border-radius: 5px;
            border: none;
            margin-right: 10px;
        }

        button {
            padding: 10px 15px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            margin-right: 10px;
        }

        .start-btn { background-color: #16a34a; color: white; }
        .stop-btn { background-color: #dc2626; color: white; }

        .status-running { color: #22c55e; font-weight: bold; }
        .status-stopped { color: #ef4444; font-weight: bold; }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 8px;
            border-bottom: 1px solid #334155;
            text-align: left;
        }

        th {
            background-color: #334155;
        }

        .log-box {
            max-height: 200px;
            overflow-y: auto;
            background-color: #0f172a;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<h1>Institutional SMC Live Engine</h1>

<div class="card">
    <h3>Engine Control</h3>
    <input type="number" id="capital" placeholder="Enter Capital (INR)">
    <button class="start-btn" onclick="startEngine()">Start</button>
    <button class="stop-btn" onclick="stopEngine()">Stop</button>
    <p>Status: <span id="status">Checking...</span></p>
</div>

<div class="card">
    <h3>Active Positions</h3>
    <table id="positionsTable">
        <thead>
            <tr>
                <th>Pair</th>
                <th>Side</th>
                <th>Qty</th>
                <th>Entry</th>
                <th>TP</th>
                <th>Continuation</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<div class="card">
    <h3>Recent Trade Log</h3>
    <div class="log-box" id="logBox"></div>
</div>

<script>

const baseURL = "https://coin-4k37.onrender.com";

function startEngine() {
    const capital = document.getElementById("capital").value;

    fetch(baseURL + "/start", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ capital: capital })
    })
    .then(res => res.json())
    .then(data => {
        alert("Engine Started");
        updateStatus();
    });
}

function stopEngine() {
    fetch(baseURL + "/stop")
    .then(res => res.json())
    .then(data => {
        alert("Engine Stopped");
        updateStatus();
    });
}

function updateStatus() {
    fetch(baseURL + "/status")
    .then(res => res.json())
    .then(data => {

        const statusEl = document.getElementById("status");
        if (data.running) {
            statusEl.innerText = "RUNNING";
            statusEl.className = "status-running";
        } else {
            statusEl.innerText = "STOPPED";
            statusEl.className = "status-stopped";
        }

        // Update Positions
        const tbody = document.querySelector("#positionsTable tbody");
        tbody.innerHTML = "";

        for (let pair in data.positions) {
            const pos = data.positions[pair];
            const row = `
                <tr>
                    <td>${pair}</td>
                    <td>${pos.side}</td>
                    <td>${pos.qty}</td>
                    <td>${pos.entry.toFixed(2)}</td>
                    <td>${pos.tp.toFixed(2)}</td>
                    <td>${pos.continuation}</td>
                </tr>
            `;
            tbody.innerHTML += row;
        }

        // Update Logs
        const logBox = document.getElementById("logBox");
        logBox.innerHTML = "";

        data.recent_log.reverse().forEach(log => {
            logBox.innerHTML += `<div>${log.event} - ${log.pair}</div>`;
        });

    });
}

setInterval(updateStatus, 3000);
updateStatus();

</script>

</body>
</html>
