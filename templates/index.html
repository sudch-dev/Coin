<!DOCTYPE html>
<html>

<head>

<title>Hedge Bot v5</title>

<style>

body{
font-family:Arial;
background:#111;
color:#eee;
padding:20px
}

.card{
background:#222;
padding:15px;
margin-bottom:10px
}

button{
padding:10px;
margin:5px
}

</style>

</head>

<body>

<h2>Crypto Hedge Bot v5</h2>

<div class="card">

Status:
<span id="status"></span>

</div>

<div class="card">

Mode:
<span id="mode"></span>

<button onclick="toggle()">Toggle Paper/Live</button>

</div>

<div class="card">

Capital:

<input id="capital" type="number">

<button onclick="setCapital()">Set</button>

</div>

<div class="card">

<button onclick="start()">Start</button>

<button onclick="stop()">Stop</button>

</div>

<div class="card">

<h3>Positions</h3>

<pre id="positions"></pre>

</div>

<div class="card">

<h3>Logs</h3>

<pre id="logs"></pre>

</div>

<script>

function start(){fetch("/start")}
function stop(){fetch("/stop")}
function toggle(){fetch("/toggle_mode")}

function setCapital(){

let c=document.getElementById("capital").value

fetch("/set_capital",{
method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:"capital="+c
})

}

function refresh(){

fetch("/status")
.then(r=>r.json())
.then(d=>{

document.getElementById("status").innerText =
d.running ? "RUNNING":"STOPPED"

document.getElementById("mode").innerText =
d.paper ? "PAPER":"LIVE"

document.getElementById("positions").innerText =
JSON.stringify(d.positions,null,2)

document.getElementById("logs").innerText =
d.logs.join("\n")

})

}

setInterval(refresh,3000)

</script>

</body>

</html>
