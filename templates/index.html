<!DOCTYPE html>
<html>
<head>
<title>SMC Live Engine</title>
<style>
body { background:#0f172a; color:white; font-family:Arial; padding:20px; }
.card { background:#1e293b; padding:20px; margin-bottom:20px; border-radius:10px; }
button { padding:8px 15px; margin-right:10px; border:none; border-radius:5px; }
.start { background:#16a34a; color:white; }
.stop { background:#dc2626; color:white; }
input { padding:8px; border-radius:5px; border:none; }
table { width:100%; margin-top:10px; }
th, td { padding:8px; border-bottom:1px solid #334155; }
</style>
</head>
<body>

<h2>Institutional SMC Live Trading</h2>

<div class="card">
<input type="number" id="capital" placeholder="Capital INR">
<button class="start" onclick="setCapital()">Set Capital</button>
<button class="start" onclick="start()">Start</button>
<button class="stop" onclick="stop()">Stop</button>
<p>Status: <span id="status"></span></p>
</div>

<div class="card">
<h3>Market Snapshot</h3>
<div id="market"></div>
</div>

<div class="card">
<h3>Open Positions</h3>
<div id="positions"></div>
</div>

<div class="card">
<h3>Trade Log</h3>
<div id="log"></div>
</div>

<script>
function start(){ fetch("/start",{method:"POST"}); }
function stop(){ fetch("/stop",{method:"POST"}); }
function setCapital(){
fetch("/set_capital",{method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({capital:document.getElementById("capital").value})});
}

function update(){
fetch("/dashboard")
.then(r=>r.json())
.then(data=>{
document.getElementById("status").innerText = data.running ? "RUNNING" : "STOPPED";

let market="";
for(let p in data.market){
market+=p+" | ₹"+data.market[p].price+" | Bias: "+data.market[p].bias+"<br>";
}
document.getElementById("market").innerHTML=market;

document.getElementById("positions").innerHTML=JSON.stringify(data.positions,null,2);
document.getElementById("log").innerHTML=data.log.map(l=>JSON.stringify(l)).join("<br>");
});
}

setInterval(update,3000);
update();
</script>

</body>
</html>
