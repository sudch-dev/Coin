<!DOCTYPE html>
<html>
<head>
    <title>ORDI/USDT Futures</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        body {
            background: #0b1220;
            color: white;
            font-family: Arial;
            text-align: center;
            padding: 20px;
        }
        .card {
            background: #14213d;
            margin: 20px 0;
            padding: 20px;
            border-radius: 10px;
        }
        button {
            width: 90%;
            padding: 15px;
            margin: 10px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
        }
        .long { background: green; color: white; }
        .short { background: red; color: white; }
        .close { background: royalblue; color: white; }
    </style>
</head>
<body>

<h1>ORDI/USDT Futures</h1>

<div class="card">
    <h3>Price</h3>
    <div id="price">--</div>
</div>

<div class="card">
    <h3>Wallet (USDT)</h3>
    <div id="wallet">--</div>
</div>

<div class="card">
    <h3>Position</h3>
    <div id="position">NONE</div>
</div>

<button class="long" onclick="trade('long')">LONG</button>
<button class="short" onclick="trade('short')">SHORT</button>
<button class="close" onclick="trade('close')">CLOSE</button>

<script>
async function update() {
    try {
        const res = await fetch("/status");
        const data = await res.json();
        document.getElementById("price").innerText = data.price;
        document.getElementById("wallet").innerText = data.wallet;
        document.getElementById("position").innerText = data.position;
    } catch (e) {
        console.log("Status error");
    }
}

async function trade(type) {
    await fetch("/" + type, { method: "POST" });
    setTimeout(update, 1000);
}

setInterval(update, 3000);
update();
</script>

</body>
</html>
