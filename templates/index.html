<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AlgoTrader Pro | Live Provision</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-slate-300 p-6 font-mono">
    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between border-b border-white/10 pb-6 mb-10">
            <div>
                <h1 class="text-2xl font-black text-white">ENGINE_PRO_v2.5</h1>
                <div id="status" class="text-[10px] uppercase font-bold mt-1 text-rose-500">Standby</div>
            </div>
            <div class="flex gap-4">
                <button onclick="cmd('start')" class="border border-emerald-500 text-emerald-500 px-6 py-2 hover:bg-emerald-500/10 transition text-xs">START_BOT</button>
                <button onclick="cmd('stop')" class="border border-rose-500 text-rose-500 px-6 py-2 hover:bg-rose-500/10 transition text-xs">STOP_BOT</button>
            </div>
        </div>

        <!-- Live Price Grid -->
        <div id="market-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10"></div>

        <div class="bg-white/5 p-6 rounded border border-white/10 mb-10">
            <p class="text-xs uppercase text-slate-500 mb-2">Available Capital (INR)</p>
            <div class="flex gap-6 items-center">
                <h2 class="text-3xl font-bold text-white">₹<span id="cap">0.00</span></h2>
                <input id="cap_in" type="number" placeholder="Set Capital" class="bg-transparent border-b border-white/20 p-2 text-xs flex-1 outline-none">
                <button onclick="setCap()" class="text-[10px] font-bold uppercase tracking-widest hover:text-white">Update</button>
            </div>
        </div>

        <div class="bg-white/5 border border-white/10 rounded overflow-hidden">
            <table class="w-full text-left text-xs">
                <thead class="bg-white/5 text-slate-500">
                    <tr><th class="p-4">Time</th><th class="p-4">Pair</th><th class="p-4">Action</th><th class="p-4 text-right">PnL</th></tr>
                </thead>
                <tbody id="logs"></tbody>
            </table>
        </div>
    </div>

    <script>
        async function cmd(c) { await fetch('/'+c, {method:'POST'}); }
        async function setCap() {
            const v = document.getElementById('cap_in').value;
            await fetch('/set_capital', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({capital:v})});
        }
        async function update() {
            const res = await fetch('/dashboard');
            const d = await res.json();
            document.getElementById('status').innerText = d.running ? 'Running (Scanning Assets)' : 'Stopped';
            document.getElementById('status').className = d.running ? 'text-[10px] uppercase font-bold mt-1 text-emerald-500' : 'text-[10px] uppercase font-bold mt-1 text-rose-500';
            document.getElementById('cap').innerText = d.capital;
            document.getElementById('market-grid').innerHTML = Object.entries(d.market).map(([p,i]) => `
                <div class="bg-white/5 border border-white/10 p-6 rounded">
                    <p class="text-[10px] text-slate-500 font-bold mb-1">${p}</p>
                    <p class="text-xl text-white font-bold">₹${i.price || 'Scanning...'}</p>
                    <div class="flex justify-between mt-4">
                        <span class="text-[9px] uppercase font-bold ${i.bias=='Bullish'?'text-emerald-400':'text-rose-400'}">${i.bias}</span>
                        <span class="text-[9px] text-slate-600 font-bold">ATR: ${i.atr}</span>
                    </div>
                </div>
            `).join('');
            document.getElementById('logs').innerHTML = d.log.reverse().map(l => `
                <tr class="border-b border-white/5">
                    <td class="p-4 text-slate-500">${l.time}</td>
                    <td class="p-4 font-bold text-slate-300">${l.pair}</td>
                    <td class="p-4 uppercase tracking-widest text-[10px]">${l.side}</td>
                    <td class="p-4 text-right font-bold ${l.pnl > 0 ? 'text-emerald-500' : 'text-rose-400'}">${l.pnl}</td>
                </tr>
            `).join('');
        }
        setInterval(update, 3000);
    </script>
</body>
</html>
