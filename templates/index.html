<!DOCTYPE html>
<html>
<head>

<title>CoinDCX AI Trading Bot</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

.container{
margin-top:40px;
}

.card{
background:#1e293b;
padding:20px;
margin:15px;
border-radius:10px;
display:inline-block;
width:200px;
}

.signal{
font-size:28px;
font-weight:bold;
}

.buy{color:#22c55e}
.sell{color:#ef4444}
.hold{color:#eab308}

</style>

</head>

<body>

<h1>CoinDCX AI Trading Dashboard</h1>

<div class="container" id="signals"></div>

<script>

async function loadSignals(){

let res = await fetch('/signals')

let data = await res.json()

let html = ""

for (let s in data){

let sig = data[s]

let cls = sig.toLowerCase()

html += `
<div class="card">
<h2>${s}</h2>
<div class="signal ${cls}">${sig}</div>
</div>
`
}

document.getElementById("signals").innerHTML = html

}

loadSignals()

setInterval(loadSignals,10000)

</script>

</body>
</html>
