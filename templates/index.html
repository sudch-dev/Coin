<!DOCTYPE html>
<html>
<head>
    <title>CoinDCX Spot Trader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0b0e11; color: white; font-family: 'Inter', sans-serif; }
        .card { background: #1e2329; border: 1px solid #2b3139; }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold text-yellow-500">CoinDCX Spot Bot</h1>
            <span id="connection" class="text-xs bg-green-900 text-green-300 px-2 py-1 rounded">LIVE</span>
        </div>

        <!-- Price & Balance Grid -->
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="card p-4 rounded-lg">
                <p class="text-gray-400 text-xs uppercase mb-1">Available USDT</p>
                <p id="equity" class="text-2xl font-mono text-white">0.00</p>
            </div>
            <div class="card p-4 rounded-lg border-yellow-500/30">
                <p class="text-gray-400 text-xs uppercase mb-1">ORDI Price</p>
                <p id="mark" class="text-2xl font-mono text-yellow-400">0.00</p>
            </div>
        </div>

        <!-- Trade Controls -->
        <div class="card p-6 rounded-xl mb-6">
            <label class="block text-xs text-gray-400 mb-2 uppercase">Order Quantity (ORDI)</label>
            <input type="number" id="tradeQty" placeholder="0.0" step="0.1" 
                   class="w-full bg-black border border-gray-700 rounded p-3 mb-6 text-xl font-mono focus:border-yellow-500 outline-none">
            
            <div class="grid grid-cols-2 gap-4">
                <button onclick="placeOrder('buy')" 
                        class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg transition uppercase tracking-wider">
                    Market Buy
                </button>
                <button onclick="placeOrder('sell')" 
                        class="bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-lg transition uppercase tracking-wider">
                    Market Sell
                </button>
            </div>
        </div>

        <!-- Order Logs -->
        <div class="card p-4 rounded-lg text-sm">
            <p class="text-gray-500 mb-2 border-b border-gray-800 pb-1">System Logs</p>
            <div id="logs" class="font-mono h-24 overflow-y-auto text-xs space-y-1">
                <p class="text-blue-400">Waiting for live data...</p>
            </div>
        </div>
    </div>

    <script>
        function log(msg, color='text-gray-400') {
            const logs = document.getElementById('logs');
            const time = new Date().toLocaleTimeString();
            logs.innerHTML = `<p class="${color}">[${time}] ${msg}</p>` + logs.innerHTML;
        }

        async function refresh() {
            try {
                const res = await fetch('/status');
                const d = await res.json();
                document.getElementById('equity').innerText = d.equity;
                document.getElementById('mark').innerText = d.mark;
            } catch (e) { log("Connection Error", "text-red-500"); }
        }

        async function placeOrder(side) {
            const qty = document.getElementById('tradeQty').value;
            if(!qty || qty <= 0) return alert("Enter a valid quantity");

            log(`Initiating ${side.toUpperCase()} for ${qty} ORDI...`, "text-yellow-500");

            try {
                const response = await fetch('/trade', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ side: side, quantity: parseFloat(qty) })
                });
                const result = await response.json();
                
                if(result.status === "success" || result.id) {
                    log(`${side.toUpperCase()} Success! ID: ${result.id || 'Market'}`, "text-green-500");
                } else {
                    log(`${side.toUpperCase()} Failed: ${result.message || JSON.stringify(result)}`, "text-red-500");
                }
            } catch (e) {
                log("Order Execution Failed", "text-red-500");
            }
            refresh();
        }

        setInterval(refresh, 3000);
        refresh();
    </script>
</body>
</html>
