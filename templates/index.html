<!DOCTYPE html>
<html>
<head>
    <title>Institutional CoinDCX Engine</title>
</head>
<body>
    <h2>Institutional Capital Deployment Engine</h2>

    <label>Investment Amount (INR):</label>
    <input type="number" id="capital" placeholder="Enter INR amount">
    <button onclick="setCapital()">Set Capital</button>
    <br><br>

    <button onclick="startBot()">Start</button>
    <button onclick="stopBot()">Stop</button>

    <h3>Status:</h3>
    <div id="status"></div>

<script>
function setCapital() {
    fetch("/set_capital", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({capital: document.getElementById("capital").value})
    });
}

function startBot() {
    fetch("/start", {method: "POST"});
}

function stopBot() {
    fetch("/stop", {method: "POST"});
}

setInterval(() => {
    fetch("/status")
    .then(res => res.json())
    .then(data => {
        document.getElementById("status").innerHTML =
            "Bot: " + data.status +
            "<br>Last Update: " + data.last +
            "<br>INR Balance: " + data.INR +
            "<br>Capital Set: " + data.capital +
            "<br>Error: " + data.error;
    });
}, 4000);
</script>
</body>
</html>
