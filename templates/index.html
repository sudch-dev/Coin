<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTCINR Pro-Bot Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0f1a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .status-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
                    BTC/INR ALGO-PRO
                </h1>
                <p class="text-slate-400 text-sm">Real-time Exchange: <span class="text-slate-200">CoinDCX</span></p>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="glass px-4 py-2 rounded-lg flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-emerald-500 status-pulse"></div>
                    <span class="text-xs font-mono uppercase tracking-widest">Bot Active</span>
                </div>
                <!-- Auto-Trade Toggle -->
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="auto-toggle" class="sr-only peer" onchange="toggleAuto()">
                    <div class="w-11 h-6 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                    <span class="ml-3 text-sm font-medium text-slate-300">AUTO-MODE</span>
                </label>
            </div>
        </div>

        <!-- Main Stats Grid -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="glass p-5 rounded-2xl">
                <p class="text-slate-400 text-xs uppercase mb-1">INR Wallet</p>
                <h2 id="inr-bal" class="text-xl font-bold font-mono text-white">₹0.00</h2>
            </div>
            <div class="glass p-5 rounded-2xl">
                <p class="text-slate-400 text-xs uppercase mb-1">BTC Assets</p>
                <h2 id="btc-bal" class="text-xl font-bold font-mono text-emerald-400">0.00000000</h2>
            </div>
            <div class="glass p-5 rounded-2xl">
                <p class="text-slate-400 text-xs uppercase mb-1">Live BTC Price</p>
                <h2 id="live-price" class="text-xl font-bold font-mono text-yellow-400">₹0.00</h2>
            </div>
            <div class="glass p-5 rounded-2xl border-l-4 border-blue-500">
                <p class="text-slate-400 text-xs uppercase mb-1">Current Signal</p>
                <h2 id="current-signal" class="text-xl font-black font-mono text-blue-400 italic">WAITING...</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Left: Trading Console -->
            <div class="lg:col-span-2 space-y-6">
                <div class="glass p-6 rounded-3xl">
                    <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
                        <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        Smart Execution
                    </h3>
                    <div class="flex flex-col md:flex-row gap-4">
                        <input id="trade-qty" type="number" placeholder="Order Qty (BTC)" class="flex-1 bg-slate-900 border border-slate-700 p-4 rounded-xl text-white focus:ring-2 focus:ring-blue-500 outline-none">
                        <div class="flex gap-2">
                            <button onclick="executeTrade('buy')" class="bg-emerald-600 hover:bg-emerald-500 px-8 py-4 rounded-xl font-black transition-all transform hover:scale-105">BUY</button>
                            <button onclick="executeTrade('sell')" class="bg-red-600 hover:bg-red-500 px-8 py-4 rounded-xl font-black transition-all transform hover:scale-105">SELL</button>
                        </div>
                    </div>
                </div>

                <!-- Live Logs -->
                <div class="glass p-6 rounded-3xl">
                    <h3 class="text-lg font-bold mb-4 text-slate-300">Execution Logs</h3>
                    <div id="log-container" class="space-y-3 max-h-80 overflow-y-auto font-mono text-sm">
                        <!-- Logs here -->
                    </div>
                </div>
            </div>

            <!-- Right: Indicators & P&L -->
            <div class="space-y-6">
                <div class="glass p-6 rounded-3xl bg-gradient-to-br from-slate-800 to-slate-900">
                    <h3 class="text-md font-bold mb-4 text-slate-400 uppercase tracking-tighter">Signal Metrics</h3>
                    <div class="space-y-4">
                        <div class="flex justify-between items-center">
                            <span>RSI (14)</span>
                            <span id="rsi-val" class="font-bold text-yellow-500">--</span>
                        </div>
                        <div class="w-full bg-slate-700 rounded-full h-1.5">
                            <div id="rsi-bar" class="bg-yellow-500 h-1.5 rounded-full" style="width: 50%"></div>
                        </div>
                        <div class="flex justify-between items-center">
                            <span>EMA Cross</span>
                            <span id="ema-status" class="text-xs px-2 py-1 rounded bg-slate-700">NEUTRAL</span>
                        </div>
                    </div>
                </div>

                <div class="glass p-6 rounded-3xl">
                    <h3 class="text-md font-bold mb-4 text-slate-400 uppercase tracking-tighter">Session P&L</h3>
                    <div class="text-center">
                        <h2 id="total-pnl" class="text-4xl font-black text-emerald-400">+₹0.00</h2>
                        <p class="text-xs text-slate-500 mt-2 italic">Calculated based on average entry</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function updateDashboard() {
            try {
                const res = await fetch('/api/portfolio');
                const data = await res.json();
                
                // Update Balances
                document.getElementById('inr-bal').innerText = `₹${data.inr.toLocaleString()}`;
                document.getElementById('btc-bal').innerText = data.btc.toFixed(8);
                document.getElementById('live-price').innerText = `₹${data.current_price.toLocaleString()}`;
                
                // Update Signals (Dummy data structure - ensure your API returns these)
                document.getElementById('current-signal').innerText = data.signal || "HOLD";
                document.getElementById('current-signal').className = `text-xl font-black font-mono ${data.signal === 'BUY' ? 'text-emerald-400' : data.signal === 'SELL' ? 'text-red-400' : 'text-blue-400'}`;
                
                document.getElementById('rsi-val').innerText = data.rsi?.toFixed(2) || "50.00";
                document.getElementById('rsi-bar').style.width = `${data.rsi || 50}%`;

                // Update Logs
                const logContainer = document.getElementById('log-container');
                if (data.logs && data.logs.length > 0) {
                    logContainer.innerHTML = data.logs.reverse().map(log => `
                        <div class="p-3 rounded-lg bg-slate-900 border-l-4 ${log.side === 'buy' ? 'border-emerald-500' : 'border-red-500'}">
                            <div class="flex justify-between text-[10px] text-slate-500 mb-1">
                                <span>${log.time}</span>
                                <span>ORDER: #${log.order_id}</span>
                            </div>
                            <div class="flex justify-between items-center">
                                <span class="font-bold text-slate-200 uppercase">${log.side} ${log.qty} BTC</span>
                                <span class="text-[10px] bg-slate-800 px-2 py-0.5 rounded text-slate-400">${log.status}</span>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (err) { console.error("Poll error:", err); }
        }

        async function toggleAuto() {
            const isAuto = document.getElementById('auto-toggle').checked;
            await fetch('/api/config', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ auto_trade: isAuto })
            });
        }

        async function executeTrade(side) {
            const qty = document.getElementById('trade-qty').value;
            if(!qty) return alert("Enter BTC Amount");
            const res = await fetch('/trade', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ side, quantity: qty })
            });
            const result = await res.json();
            console.log(result);
            updateDashboard();
        }

        setInterval(updateDashboard, 3000); // 3s for "Pro" feel
        updateDashboard();
    </script>
</body>
</html>
